<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contador Regresivo - 16 de Octubre 2027</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" crossorigin href="/assets/index-CrBgX5T8.css">
</head>
<body>
  <nav class="navigation">
    <a href="index.html" class="nav-link active">Inicio</a>
    <a href="poemas/poema1.html" class="nav-link">Poema 1</a>
    <a href="poemas/poema2.html" class="nav-link">Poema 2</a>
    <a href="poemas/poema3.html" class="nav-link">Poema 3</a>
    <a href="poemas/poema4.html" class="nav-link">Poema 4</a>
    <a href="dedicatorias.html" class="nav-link">Dedicatorias</a>
  </nav>

  <!-- Decorative background elements -->
  <div class="bg-decoration" id="bgDecoration"></div>

  <div class="container">
    <section id="countdown-section">
      <h1>Tiempo Restante</h1>
      <div id="final-message" class="hidden">¡El Tiempo ha Llegado!</div>
      
      <div id="countdown-container">
        <div class="time-unit">
          <span class="time-label">Años</span>
          <span id="years" class="time-value">0</span>
        </div>
        <div class="time-unit">
          <span class="time-label">Meses</span>
          <span id="months" class="time-value">0</span>
        </div>
        <div class="time-unit">
          <span class="time-label">Semanas</span>
          <span id="weeks" class="time-value">0</span>
        </div>
        <div class="time-unit">
          <span class="time-label">Días</span>
          <span id="days" class="time-value">0</span>
        </div>
        <div class="time-unit">
          <span class="time-label">Horas</span>
          <span id="hours" class="time-value">0</span>
        </div>
        <div class="time-unit">
          <span class="time-label">Minutos</span>
          <span id="minutes" class="time-value">0</span>
        </div>
        <div class="time-unit">
          <span class="time-label">Segundos</span>
          <span id="seconds" class="time-value">0</span>
        </div>
      </div>
    </section>

    <section id="calendar-section">
      <h2>Calendario de Fechas Especiales</h2>
      <div class="calendar-container">
        <div class="calendar-header">
          <button class="calendar-nav-btn" onclick="changeMonth(-1)">◀ Anterior</button>
          <span class="calendar-month-year" id="monthYear"></span>
          <button class="calendar-nav-btn" onclick="changeMonth(1)">Siguiente ▶</button>
        </div>
        <div class="calendar-grid" id="calendarGrid">
          <!-- Calendar will be generated by JavaScript -->
        </div>
        <div class="calendar-legend">
          <div class="legend-item">
            <span class="legend-color important-legend"></span>
            <span>Primer día del mes (Fechas Especiales)</span>
          </div>
          <div class="legend-item">
            <span class="legend-color today-legend"></span>
            <span>Hoy</span>
          </div>
        </div>
      </div>
    </section>

    <section id="playlist-section">
      <h2>Playlist Musical</h2>
      <div class="playlist-container">
        <iframe src="https://www.youtube.com/embed/videoseries?list=PLDbeoZ57LM7uaUlAboUhaAgtGSbR5FQmS" 
                title="YouTube Music Playlist" 
                frameborder="0" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                allowfullscreen>
        </iframe>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
